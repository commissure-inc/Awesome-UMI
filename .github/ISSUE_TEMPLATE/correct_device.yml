name: Correct device
description: Fix or update an existing catalog entry
title: "[fix] "
labels:
  - submission
  - correction
body:
  - type: markdown
    attributes:
      value: |
        Propose a correction to an existing product in the catalog.
        Include a source URL that supports the change.

  - type: input
    id: product_id
    attributes:
      label: Product ID
      description: Existing `id` in the catalog (e.g. `umi`, `dex_umi`)
      placeholder: umi
    validations:
      required: true

  - type: textarea
    id: changes
    attributes:
      label: What should change?
      description: Field names and new values, or describe the error
      placeholder: |
        cost_usd: 371 → 400
        year_latest: 2024 → 2025
    validations:
      required: true

  - type: input
    id: source_url
    attributes:
      label: Source URL
      description: Page or document that verifies the correction
      placeholder: https://
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: Notes (optional)
      description: Context for reviewers
